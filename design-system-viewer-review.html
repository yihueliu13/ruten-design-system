<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,'PingFang TC',sans-serif;background:#F6F7FE;color:#161619;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D2D3D9;border-radius:2px}
::selection{background:#FF963B30}

.wrap{display:flex;min-height:100vh}

/* === SIDEBAR === */
.side{width:220px;position:fixed;top:0;left:0;height:100vh;background:#FFF;padding:28px 0;overflow-y:auto;z-index:50;border-right:1px solid #EBECF3}
.side .logo{padding:0 20px;margin-bottom:32px;display:flex;align-items:center;gap:10px}
.side .logo-i{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFB366,#FF963B);display:flex;align-items:center;justify-content:center}
.side .logo-i svg{width:20px;height:20px}
.side .logo-t{font-size:15px;font-weight:800;color:#161619;letter-spacing:-.01em}
.side .logo-v{font-size:10px;color:#9798A2;font-weight:500}
.side .grp{padding:0 20px;margin-top:24px;margin-bottom:8px;font-size:10px;font-weight:600;color:#B9BABF;letter-spacing:.04em}
.side .ni{display:flex;align-items:center;gap:10px;width:calc(100% - 20px);margin:2px 10px;padding:8px 12px;border:none;cursor:pointer;font-size:13px;font-family:inherit;background:transparent;color:#73747B;border-radius:10px;transition:all .12s;font-weight:500;text-align:left}
.side .ni:hover{background:#F6F7FE;color:#47484D}
.side .ni.on{background:#FF963B12;color:#FF963B;font-weight:600}
.side .ni .ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.7}
.side .ni.on .ic{opacity:1}

/* === MAIN === */
.main{margin-left:220px;flex:1;padding:28px 48px 60px;max-width:900px}

/* Breadcrumb */
.bc{font-size:11px;color:#B9BABF;font-weight:500;letter-spacing:.06em;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.bc .ver{display:flex;align-items:center;gap:5px;font-size:11px;color:#9798A2}
.bc .ver .dot{width:6px;height:6px;border-radius:3px;background:#00B79C}

/* Page badge */
.badge{display:inline-block;font-size:11px;font-weight:700;color:#FF963B;letter-spacing:.08em;margin-bottom:8px}

/* Page title */
.ptitle{font-size:32px;font-weight:800;color:#161619;letter-spacing:-.03em;margin-bottom:6px}
.pdesc{font-size:14px;color:#9798A2;line-height:1.5;margin-bottom:36px}

/* Section title */
.stitle{font-size:18px;font-weight:700;color:#161619;margin-bottom:16px;letter-spacing:-.01em}

/* Card */
.card{background:#FFF;border-radius:16px;padding:28px;margin-bottom:20px;border:1px solid #EBECF3}

/* Sub card label */
.clabel{font-size:13px;font-weight:600;color:#47484D;margin-bottom:16px}

/* Swatch circle */
.circ{border-radius:50%;transition:transform .15s,box-shadow .15s;cursor:pointer}
.circ:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(0,0,0,.1)}

/* Category label */
.catbadge{display:inline-block;font-size:11px;font-weight:700;color:#FF963B;letter-spacing:.04em;margin-bottom:12px}

/* Type preview */
.tyrow{display:flex;align-items:baseline;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0F0F5}
.tyrow:last-child{border-bottom:none}
.tyinfo{text-align:right;white-space:nowrap}
.tyname{font-size:12px;font-weight:600;color:#47484D}
.tyspec{font-size:11px;color:#B9BABF}

/* Elevation card */
.ecard{background:#FFF;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;height:140px;transition:transform .2s;cursor:default}
.ecard:hover{transform:translateY(-4px)}
.ecard .enum{font-size:36px;font-weight:800;color:#161619}
.ecard .ename{font-size:13px;font-weight:600;color:#47484D;margin-top:4px}
.ecard .edesc{font-size:11px;color:#9798A2;margin-top:2px}

/* Opacity swatch */
.ocard{display:flex;flex-direction:column;align-items:center;gap:6px}
.obox{width:56px;height:56px;border-radius:12px;border:1px solid #EBECF3}
.oname{font-size:10px;font-weight:600;color:#47484D}
.oval{font-size:9px;color:#9798A2}

/* Spacing bar */
.sprow{display:flex;align-items:center;gap:12px;padding:8px 0}
.spbar{height:12px;border-radius:6px;background:linear-gradient(90deg,#FF963B,#FFB366);transition:width .5s cubic-bezier(.34,1.56,.64,1)}

/* Radius demo */
.rdemo{border:2.5px solid #FF963B;background:#FF963B08;transition:all .2s;cursor:pointer}
.rdemo:hover{background:#FF963B14;transform:scale(1.04)}

/* Font family showcase */
.ffbox{text-align:center}
.ffchar{font-size:48px;font-weight:700;color:#161619;margin-bottom:4px}
.ffname{font-size:13px;font-weight:600;color:#161619}
.ffdesc{font-size:11px;color:#9798A2}

/* Z-index */
.zrow{display:flex;align-items:center;gap:10px;padding:8px 12px;margin:2px 0;border-radius:8px;transition:transform .15s}
.zrow:hover{transform:translateX(4px)}

/* Duration */
.durcard{background:#FFF;border-radius:14px;padding:20px;text-align:center;border:1px solid #EBECF3;cursor:pointer;transition:all .2s}
.durcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.04)}

/* Token row */
.tkrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F6F7FE}
.tkrow:last-child{border-bottom:none}
.tkn{font-size:11px;font-weight:600;color:#161619}
.tkv{font-size:10px;color:#9798A2;font-family:'SF Mono',monospace}

/* Footer */
footer{text-align:center;padding:40px 0 20px;font-size:11px;color:#B9BABF}
footer a{color:#9798A2;text-decoration:none}

/* Responsive */
@media(max-width:768px){.side{display:none}.main{margin-left:0;padding:20px}}
</style>

let DATA = null;
let ALL = [];
let REF = [];
let SYS = [];
let COMP = [];

const DATA_SOURCE = "(inline snapshot)";
const VIEWER_VERSION = 'v1.1.0-snapshot';
const DATA_SOURCE_LABEL = 'inline snapshot';

async function loadData(){
  try{
    DATA = INLINE_DATA;
  }catch(err){
    console.error('Failed to load source of truth JSON:', err);
    document.getElementById('side').innerHTML = `<div class="logo"><div class="logo-i"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#FFF" stroke-width="2"/><path d="M8 15c1.5-2 4.5-2 6 0M9 10h.01M15 10h.01" stroke="#FFF" stroke-width="2" stroke-linecap="round"/></svg></div><div><div class="logo-t">Design System</div><div class="logo-v">${VIEWER_VERSION}</div></div></div>`;
    document.getElementById('main').innerHTML = `
      <div class="bc"><span>DESIGN SYSTEM</span><span class="ver"><span class="dot" style="background:#FF4E51"></span>source error</span></div>
      <div class="badge">ERROR</div>
      <h1 class="ptitle">無法載入唯一真實來源</h1>
      <p class="pdesc">viewer 已改為從 <strong>design-system-all.json</strong> 讀取資料，不再依賴內嵌快照。請確認 JSON 檔與 viewer 位於同一資料夾，且格式可被正常解析。</p>
      <div class="card">
        <div class="clabel">檢查清單</div>
        <div class="tkrow"><div class="tkn">source</div><div class="tkv" style="margin-left:auto">design-system-all.json</div></div>
        <div class="tkrow"><div class="tkn">location</div><div class="tkv" style="margin-left:auto">與 design-system-viewer-live.html 同層</div></div>
        <div class="tkrow"><div class="tkn">format</div><div class="tkv" style="margin-left:auto">合法 JSON，含 ref / sys / comp</div></div>
      </div>`;
    return;
  }
  ALL = flat(DATA,'');
  REF = ALL.filter(t=>t.path.startsWith('ref/'));
  SYS = ALL.filter(t=>t.path.startsWith('sys/'));
  COMP = ALL.filter(t=>t.path.startsWith('comp/'));
  buildSide();
  go('overview');
}

// Parser
function flat(o,p){let r=[];for(let k in o){if(k[0]==='$')continue;let pp=p?p+'/'+k:k;if(o[k]&&o[k].$type)r.push({path:pp,type:o[k].$type,value:o[k].$value,desc:o[k].$description||''});else if(o[k]&&typeof o[k]==='object')r=r.concat(flat(o[k],pp))}return r}
function gTk(tier,cat){return ALL.filter(t=>t.path.startsWith(tier+'/'+cat+'/'))}
const isLt=h=>{if(!h||h.length<7||typeof h!=='string')return true;try{let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>140}catch(e){return true}};
const isA=v=>typeof v==='string'&&v.startsWith('{');
const rHex=v=>{if(typeof v==='string'&&v.startsWith('#'))return v;if(isA(v)){let t=ALL.find(x=>x.path===v.replace(/[{}]/g,''));return t?rHex(t.value):'#EEE'}return'#EEE'};
const rNum=v=>{if(typeof v==='number')return v;if(isA(v)){let t=ALL.find(x=>x.path===v.replace(/[{}]/g,''));return t?rNum(t.value):0}return 0};

// === ROUTER ===
function go(page){
  curPage=page;
  buildSide();
  let h='';
  switch(page){
    case'overview':h=pgOverview();break;
    case'colors':h=pgColors();break;
    case'typography':h=pgTypography();break;
    case'spacing':h=pgSpacing();break;
    case'radius':h=pgRadius();break;
    case'elevation':h=pgElevation();break;
    case'button':h=pgButton();break;
    case'tab':h=pgTab();break;
    case'avatar':h=pgAvatar();break;
    case'thumbnail':h=pgThumbnail();break;
    case'input':h=pgInput();break;
    case'badge':h=pgBadge();break;
    case'card':h=pgCard();break;
    case'motion':h=pgMotion();break;
    case'grid':h=pgGrid();break;
    default:h=pgOverview();
  }
  document.getElementById('main').innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}
