<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,'PingFang TC',sans-serif;background:#F6F7FE;color:#161619;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D2D3D9;border-radius:2px}
::selection{background:#FF963B30}

.wrap{display:flex;min-height:100vh}

/* === SIDEBAR === */
.side{width:220px;position:fixed;top:0;left:0;height:100vh;background:#FFF;padding:28px 0;overflow-y:auto;z-index:50;border-right:1px solid #EBECF3}
.side .logo{padding:0 20px;margin-bottom:32px;display:flex;align-items:center;gap:10px}
.side .logo-i{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFB366,#FF963B);display:flex;align-items:center;justify-content:center}
.side .logo-i svg{width:20px;height:20px}
.side .logo-t{font-size:15px;font-weight:800;color:#161619;letter-spacing:-.01em}
.side .logo-v{font-size:10px;color:#9798A2;font-weight:500}
.side .grp{padding:0 20px;margin-top:24px;margin-bottom:8px;font-size:10px;font-weight:600;color:#B9BABF;letter-spacing:.04em}
.side .ni{display:flex;align-items:center;gap:10px;width:calc(100% - 20px);margin:2px 10px;padding:8px 12px;border:none;cursor:pointer;font-size:13px;font-family:inherit;background:transparent;color:#73747B;border-radius:10px;transition:all .12s;font-weight:500;text-align:left}
.side .ni:hover{background:#F6F7FE;color:#47484D}
.side .ni.on{background:#FF963B12;color:#FF963B;font-weight:600}
.side .ni .ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.7}
.side .ni.on .ic{opacity:1}

/* === MAIN === */
.main{margin-left:220px;flex:1;padding:28px 48px 60px;max-width:900px}

/* Breadcrumb */
.bc{font-size:11px;color:#B9BABF;font-weight:500;letter-spacing:.06em;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.bc .ver{display:flex;align-items:center;gap:5px;font-size:11px;color:#9798A2}
.bc .ver .dot{width:6px;height:6px;border-radius:3px;background:#00B79C}

/* Page badge */
.badge{display:inline-block;font-size:11px;font-weight:700;color:#FF963B;letter-spacing:.08em;margin-bottom:8px}

/* Page title */
.ptitle{font-size:32px;font-weight:800;color:#161619;letter-spacing:-.03em;margin-bottom:6px}
.pdesc{font-size:14px;color:#9798A2;line-height:1.5;margin-bottom:36px}

/* Section title */
.stitle{font-size:18px;font-weight:700;color:#161619;margin-bottom:16px;letter-spacing:-.01em}

/* Card */
.card{background:#FFF;border-radius:16px;padding:28px;margin-bottom:20px;border:1px solid #EBECF3}

/* Sub card label */
.clabel{font-size:13px;font-weight:600;color:#47484D;margin-bottom:16px}

/* Swatch circle */
.circ{border-radius:50%;transition:transform .15s,box-shadow .15s;cursor:pointer}
.circ:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(0,0,0,.1)}

/* Category label */
.catbadge{display:inline-block;font-size:11px;font-weight:700;color:#FF963B;letter-spacing:.04em;margin-bottom:12px}

/* Type preview */
.tyrow{display:flex;align-items:baseline;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0F0F5}
.tyrow:last-child{border-bottom:none}
.tyinfo{text-align:right;white-space:nowrap}
.tyname{font-size:12px;font-weight:600;color:#47484D}
.tyspec{font-size:11px;color:#B9BABF}

/* Elevation card */
.ecard{background:#FFF;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;height:140px;transition:transform .2s;cursor:default}
.ecard:hover{transform:translateY(-4px)}
.ecard .enum{font-size:36px;font-weight:800;color:#161619}
.ecard .ename{font-size:13px;font-weight:600;color:#47484D;margin-top:4px}
.ecard .edesc{font-size:11px;color:#9798A2;margin-top:2px}

/* Opacity swatch */
.ocard{display:flex;flex-direction:column;align-items:center;gap:6px}
.obox{width:56px;height:56px;border-radius:12px;border:1px solid #EBECF3}
.oname{font-size:10px;font-weight:600;color:#47484D}
.oval{font-size:9px;color:#9798A2}

/* Spacing bar */
.sprow{display:flex;align-items:center;gap:12px;padding:8px 0}
.spbar{height:12px;border-radius:6px;background:linear-gradient(90deg,#FF963B,#FFB366);transition:width .5s cubic-bezier(.34,1.56,.64,1)}

/* Radius demo */
.rdemo{border:2.5px solid #FF963B;background:#FF963B08;transition:all .2s;cursor:pointer}
.rdemo:hover{background:#FF963B14;transform:scale(1.04)}

/* Font family showcase */
.ffbox{text-align:center}
.ffchar{font-size:48px;font-weight:700;color:#161619;margin-bottom:4px}
.ffname{font-size:13px;font-weight:600;color:#161619}
.ffdesc{font-size:11px;color:#9798A2}

/* Z-index */
.zrow{display:flex;align-items:center;gap:10px;padding:8px 12px;margin:2px 0;border-radius:8px;transition:transform .15s}
.zrow:hover{transform:translateX(4px)}

/* Duration */
.durcard{background:#FFF;border-radius:14px;padding:20px;text-align:center;border:1px solid #EBECF3;cursor:pointer;transition:all .2s}
.durcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.04)}

/* Token row */
.tkrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F6F7FE}
.tkrow:last-child{border-bottom:none}
.tkn{font-size:11px;font-weight:600;color:#161619}
.tkv{font-size:10px;color:#9798A2;font-family:'SF Mono',monospace}

/* Footer */
footer{text-align:center;padding:40px 0 20px;font-size:11px;color:#B9BABF}
footer a{color:#9798A2;text-decoration:none}

/* Responsive */
@media(max-width:768px){.side{display:none}.main{margin-left:0;padding:20px}}
</style>
</head>
<body>
<div class="wrap">
<div class="side" id="side"></div>
<div class="main" id="main"></div>
</div>
<script>
let DATA = null;
let ALL = [];
let REF = [];
let SYS = [];
let COMP = [];

const DATA_SOURCE = './design-system-all.json';
const VIEWER_VERSION = 'v1.1.0-live';
const DATA_SOURCE_LABEL = 'design-system-all.json';

async function loadData(){
  try{
    const res = await fetch(`${DATA_SOURCE}?v=${Date.now()}`, { cache: 'no-store' });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA = await res.json();
  }catch(err){
    console.error('Failed to load source of truth JSON:', err);
    document.getElementById('side').innerHTML = `<div class="logo"><div class="logo-i"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#FFF" stroke-width="2"/><path d="M8 15c1.5-2 4.5-2 6 0M9 10h.01M15 10h.01" stroke="#FFF" stroke-width="2" stroke-linecap="round"/></svg></div><div><div class="logo-t">Design System</div><div class="logo-v">${VIEWER_VERSION}</div></div></div>`;
    document.getElementById('main').innerHTML = `
      <div class="bc"><span>DESIGN SYSTEM</span><span class="ver"><span class="dot" style="background:#FF4E51"></span>source error</span></div>
      <div class="badge">ERROR</div>
      <h1 class="ptitle">無法載入唯一真實來源</h1>
      <p class="pdesc">viewer 已改為從 <strong>design-system-all.json</strong> 讀取資料，不再依賴內嵌快照。請確認 JSON 檔與 viewer 位於同一資料夾，且格式可被正常解析。</p>
      <div class="card">
        <div class="clabel">檢查清單</div>
        <div class="tkrow"><div class="tkn">source</div><div class="tkv" style="margin-left:auto">design-system-all.json</div></div>
        <div class="tkrow"><div class="tkn">location</div><div class="tkv" style="margin-left:auto">與 design-system-viewer-live.html 同層</div></div>
        <div class="tkrow"><div class="tkn">format</div><div class="tkv" style="margin-left:auto">合法 JSON，含 ref / sys / comp</div></div>
      </div>`;
    return;
  }
  ALL = flat(DATA,'');
  REF = ALL.filter(t=>t.path.startsWith('ref/'));
  SYS = ALL.filter(t=>t.path.startsWith('sys/'));
  COMP = ALL.filter(t=>t.path.startsWith('comp/'));
  buildSide();
  go('overview');
}

// Parser
function flat(o,p){let r=[];for(let k in o){if(k[0]==='$')continue;let pp=p?p+'/'+k:k;if(o[k]&&o[k].$type)r.push({path:pp,type:o[k].$type,value:o[k].$value,desc:o[k].$description||''});else if(o[k]&&typeof o[k]==='object')r=r.concat(flat(o[k],pp))}return r}
function gTk(tier,cat){return ALL.filter(t=>t.path.startsWith(tier+'/'+cat+'/'))}
const isLt=h=>{if(!h||h.length<7||typeof h!=='string')return true;try{let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>140}catch(e){return true}};
const isA=v=>typeof v==='string'&&v.startsWith('{');
const rHex=v=>{if(typeof v==='string'&&v.startsWith('#'))return v;if(isA(v)){let t=ALL.find(x=>x.path===v.replace(/[{}]/g,''));return t?rHex(t.value):'#EEE'}return'#EEE'};
const rNum=v=>{if(typeof v==='number')return v;if(isA(v)){let t=ALL.find(x=>x.path===v.replace(/[{}]/g,''));return t?rNum(t.value):0}return 0};

// Pages
const PAGES=[
  {id:'overview',icon:'✦',label:'概覽'},
  {id:'colors',icon:'◉',label:'色彩系統'},
  {id:'typography',icon:'T',label:'文字排版'},
  {id:'spacing',icon:'⊞',label:'間距系統'},
  {id:'radius',icon:'□',label:'圓角'},
  {id:'elevation',icon:'◎',label:'陰影層級'},
  {id:'button',icon:'✧',label:'按鈕'},
  {id:'tab',icon:'⊟',label:'Tab 標籤'},
  {id:'avatar',icon:'◕',label:'Avatar 頭像'},
  {id:'thumbnail',icon:'▣',label:'Thumbnail 縮圖'},
  {id:'input',icon:'⌨',label:'輸入元件'},
  {id:'badge',icon:'◇',label:'標籤徽章'},
  {id:'card',icon:'⊡',label:'卡片'},
];
const ADV=[
  {id:'motion',icon:'⚡',label:'動態互動'},
  {id:'grid',icon:'⊞',label:'Grid 系統'},
];
let curPage='overview';

// Sidebar
function buildSide(){
  let h=`<div class="logo"><div class="logo-i"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#FFF" stroke-width="2"/><path d="M8 15c1.5-2 4.5-2 6 0M9 10h.01M15 10h.01" stroke="#FFF" stroke-width="2" stroke-linecap="round"/></svg></div><div><div class="logo-t">Design System</div><div class="logo-v">${VIEWER_VERSION}</div></div></div>`;
  h+='<div class="grp">基礎元素</div>';
  PAGES.forEach(p=>{h+=`<button class="ni${curPage===p.id?' on':''}" onclick="go('${p.id}')"><span class="ic">${p.icon}</span>${p.label}</button>`});
  h+='<div class="grp">進階元件</div>';
  ADV.forEach(p=>{h+=`<button class="ni${curPage===p.id?' on':''}" onclick="go('${p.id}')"><span class="ic">${p.icon}</span>${p.label}</button>`});
  document.getElementById('side').innerHTML=h;
}

// Page header
function pgHead(badge,title,desc){
  let name=badge.toUpperCase();
  return`<div class="bc"><span>DESIGN SYSTEM / ${name}</span><span class="ver"><span class="dot"></span>${VIEWER_VERSION} · ${DATA_SOURCE_LABEL}</span></div><div class="badge">${name}</div><h1 class="ptitle">${title}</h1><p class="pdesc">${desc}</p>`;
}

// === PAGE: OVERVIEW ===
function pgOverview(){
  return`<div class="bc"><span>DESIGN SYSTEM</span><span class="ver"><span class="dot"></span>${VIEWER_VERSION} · ${DATA_SOURCE_LABEL}</span></div>
  <div class="badge">OVERVIEW</div><h1 class="ptitle">設計系統概覽</h1><p class="pdesc">露天市集多品牌設計系統。基於 MD3 命名規範，三層 Token 架構（ref → sys → comp）。</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px">
    <div class="card" style="text-align:center;padding:32px"><div style="font-size:40px;font-weight:900;color:#FF963B">${REF.length}</div><div style="font-size:13px;color:#9798A2;margin-top:4px">ref tokens</div></div>
    <div class="card" style="text-align:center;padding:32px"><div style="font-size:40px;font-weight:900;color:#3B82F6">${SYS.length}</div><div style="font-size:13px;color:#9798A2;margin-top:4px">sys tokens</div></div>
    <div class="card" style="text-align:center;padding:32px"><div style="font-size:40px;font-weight:900;color:#00B79C">${COMP.length}</div><div style="font-size:13px;color:#9798A2;margin-top:4px">comp tokens</div></div>
  </div>
  <div class="card"><div class="clabel">Token 繼承流程</div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="flex:1;min-width:160px;background:#FFF8F1;border-radius:12px;padding:14px;border:1px solid #FFEAD5"><div style="font-size:10px;font-weight:700;color:#FF963B;margin-bottom:4px">REF</div><div style="font-size:11px;font-weight:600">ref/color/orange/500</div><div style="font-size:10px;color:#9798A2;font-family:monospace">#FF963B</div></div>
    <div style="font-size:18px;color:#D2D3D9">→</div>
    <div style="flex:1;min-width:160px;background:#E5EEFF;border-radius:12px;padding:14px;border:1px solid #CDDFFF"><div style="font-size:10px;font-weight:700;color:#3B82F6;margin-bottom:4px">SYS</div><div style="font-size:11px;font-weight:600">sys/color/primary</div><div style="font-size:10px;color:#9798A2;font-family:monospace">{ref/color/orange/500}</div></div>
    <div style="font-size:18px;color:#D2D3D9">→</div>
    <div style="flex:1;min-width:160px;background:#DBFFF6;border-radius:12px;padding:14px;border:1px solid #B5FFEC"><div style="font-size:10px;font-weight:700;color:#00B79C;margin-bottom:4px">COMP</div><div style="font-size:11px;font-weight:600">comp/button/primary/bg</div><div style="font-size:10px;color:#9798A2;font-family:monospace">{sys/color/primary}</div></div>
  </div></div>`;
}

// === PAGE: COLORS ===
function pgColors(){
  let h=pgHead('colors','色彩系統','基於 Orange 暖色調的品牌色彩，搭配完整的語意色彩系統，確保一致的視覺語言。');

  // ref palettes as circles
  let palettes={};
  gTk('ref','color').forEach(t=>{let p=t.path.split('/'),pl=p[2];if(!palettes[pl])palettes[pl]=[];palettes[pl].push({s:p[3],h:t.value})});

  const paletteNames={orange:'Orange — 品牌主色',neutral:'Neutral — 中性色',red:'Red',yellow:'Yellow',blue:'Blue',teal:'Teal',black:'Black / Overlay'};

  for(let[name,swatches]of Object.entries(palettes)){
    if(['red','yellow','blue','teal','black'].includes(name))continue; // show only main palettes at top
    h+=`<div class="stitle">${paletteNames[name]||name}</div><div class="card"><div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">`;
    swatches.forEach(c=>{
      h+=`<div style="text-align:center"><div class="circ" style="width:64px;height:64px;background:${c.h};${isLt(c.h)?'border:1px solid #E3E4EB':''}"></div><div style="font-size:11px;font-weight:600;color:#47484D;margin-top:6px">${c.s}</div></div>`;
    });
    h+=`</div></div>`;
  }

  // Neutral
  h+=`<div class="stitle">${paletteNames.neutral}</div><div class="card"><div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">`;
  (palettes.neutral||[]).forEach(c=>{
    h+=`<div style="text-align:center"><div class="circ" style="width:64px;height:64px;background:${c.h};${isLt(c.h)?'border:1px solid #E3E4EB':''}"></div><div style="font-size:11px;font-weight:600;color:#47484D;margin-top:6px">${c.s}</div></div>`;
  });
  h+=`</div></div>`;

  // Semantic Colors
  h+=`<div class="stitle">語意色彩 Semantic Colors</div>`;

  // Primary + Surface
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">`;

  // Primary
  h+=`<div class="card"><div class="clabel">主要色 Primary</div>`;
  let prim=[{n:'primary',zh:'主操作'},{n:'on-primary',zh:'主色上文字'},{n:'primary-container',zh:'柔和主色背景'},{n:'on-primary-container',zh:'容器上文字'}];
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  prim.forEach(p=>{
    let tk=SYS.find(t=>t.path==='sys/color/'+p.n);
    let hex=tk?rHex(tk.value):'#EEE';
    h+=`<div><div style="width:100%;height:56px;border-radius:10px;background:${hex};${isLt(hex)?'border:1px solid #E3E4EB':''}"></div><div style="font-size:11px;font-weight:600;color:#161619;margin-top:6px">${p.n}</div><div style="font-size:10px;color:#9798A2">${p.zh}</div></div>`;
  });
  h+=`</div></div>`;

  // Surface
  h+=`<div class="card"><div class="clabel">表面色 Surface</div>`;
  let surf=[{n:'surface',zh:'頁面底色'},{n:'surface-dim',zh:'淺灰底色'},{n:'surface-container-high',zh:'高層容器'},{n:'inverse-surface',zh:'深色反轉'}];
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  surf.forEach(p=>{
    let tk=SYS.find(t=>t.path==='sys/color/'+p.n);
    let hex=tk?rHex(tk.value):'#EEE';
    h+=`<div><div style="width:100%;height:56px;border-radius:10px;background:${hex};${isLt(hex)?'border:1px solid #E3E4EB':''}"></div><div style="font-size:11px;font-weight:600;color:#161619;margin-top:6px">${p.n}</div><div style="font-size:10px;color:#9798A2">${p.zh}</div></div>`;
  });
  h+=`</div></div></div>`;

  // Status + Status Container
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">`;
  // Status
  h+=`<div class="card"><div class="clabel">狀態色 Status</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  [{n:'error',zh:'錯誤'},{n:'warning',zh:'警告'},{n:'success',zh:'成功'},{n:'info',zh:'資訊'}].forEach(p=>{
    let tk=SYS.find(t=>t.path==='sys/color/'+p.n);let hex=tk?rHex(tk.value):'#EEE';
    h+=`<div><div style="width:100%;height:56px;border-radius:10px;background:${hex};${isLt(hex)?'border:1px solid #E3E4EB':''}"></div><div style="font-size:11px;font-weight:600;color:#161619;margin-top:6px">${p.n}</div><div style="font-size:10px;color:#9798A2">${p.zh}</div></div>`;
  });
  h+=`</div></div>`;

  // Status Container
  h+=`<div class="card"><div class="clabel">狀態容器色 Status Container</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  [{n:'error-container',zh:'錯誤背景'},{n:'warning-container',zh:'警告背景'},{n:'success-container',zh:'成功背景'},{n:'info-container',zh:'資訊背景'}].forEach(p=>{
    let tk=SYS.find(t=>t.path==='sys/color/'+p.n);let hex=tk?rHex(tk.value):'#EEE';
    h+=`<div><div style="width:100%;height:56px;border-radius:10px;background:${hex};${isLt(hex)?'border:1px solid #E3E4EB':''}"></div><div style="font-size:11px;font-weight:600;color:#161619;margin-top:6px">${p.n}</div><div style="font-size:10px;color:#9798A2">${p.zh}</div></div>`;
  });
  h+=`</div></div></div>`;

  // Scrim
  h+=`<div class="card"><div class="clabel">遮罩色 Scrim</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">`;
  [{n:'scrim',zh:'60% 黑'},{n:'scrim-medium',zh:'40% 黑'},{n:'scrim-light',zh:'15% 黑'}].forEach(p=>{
    let tk=SYS.find(t=>t.path==='sys/color/'+p.n);let hex=tk?rHex(tk.value):'#EEE';
    h+=`<div style="text-align:center"><div style="width:100%;height:64px;border-radius:10px;background:${hex};border:1px solid #E3E4EB"></div><div style="font-size:11px;font-weight:600;color:#161619;margin-top:6px">${p.n}</div><div style="font-size:10px;color:#9798A2">${p.zh}</div></div>`;
  });
  h+=`</div></div>`;

  return h;
}

// === PAGE: TYPOGRAPHY ===
function pgTypography(){
  let h=pgHead('typography','文字排版','使用 PingFang TC 與 SF Pro 的 130 個 Text Styles（full matrix），涵蓋 Display、Headline、Title、Body、Label 五大層級。');

  // Font family
  h+=`<div class="card"><div class="clabel">字型 Font Family</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px">
    <div class="ffbox"><div class="ffchar" style="font-family:'PingFang TC',sans-serif">字</div><div class="ffname">PingFang TC</div><div class="ffdesc">中文主字型 / Chinese Primary</div></div>
    <div class="ffbox"><div class="ffchar">Aa</div><div class="ffname">SF Pro</div><div class="ffdesc">英文主字型 / English Primary</div></div>
  </div></div>`;

  // Type scales by category
  const scales=[

// === PAGE: BUTTON (4-role × 5-size × states × form × dialog) ===
function pgButton(){
  let h=pgHead('button','按鈕 Button','4 角色 × 5 尺寸 × 5 狀態 × 3 型態。Action × Primitive。60 tokens。');

  // Helper to make a button
  const btn=(role,label,size,state,form)=>{
    const R={
      primary:{bg:'#33343B',text:'#FF963B',bd:'none'},
      secondary:{bg:'#FF963B',text:'#FFF',bd:'none'},
      tertiary:{bg:'#FFF',text:'#FF963B',bd:'1px solid #B9BABF'},
      ghost:{bg:'transparent',text:'#FF963B',bd:'none'},
    }[role];
    const S={xs:{h:24,ph:8,pv:2,fs:11,r:'9999px',ic:12},sm:{h:32,ph:12,pv:4,fs:12,r:'8px',ic:16},md:{h:40,ph:16,pv:8,fs:14,r:'8px',ic:20},lg:{h:48,ph:24,pv:10,fs:14,r:'8px',ic:24},xl:{h:52,ph:32,pv:10,fs:16,r:'8px',ic:24}}[size||'md'];
    let op=1,cur='pointer',extra='';
    if(state==='hover'&&role==='primary')op=0.85;
    if(state==='hover'&&role==='secondary')extra='background:#E6781F;';
    if(state==='hover'&&role==='tertiary')extra='background:#FFF8F1;border-color:#FF963B;';
    if(state==='hover'&&role==='ghost')extra='background:#FFF8F1;';
    if(state==='pressed')op=0.7;
    if(state==='disabled'){op=0.4;cur='not-allowed';}
    if(state==='loading')label='⟳ '+label;
    let iconHtml='';
    if(form==='label-icon')iconHtml=`<span style="font-size:${S.ic}px">+</span>`;
    if(form==='icon')label='',iconHtml=`<span style="font-size:${S.ic}px">✕</span>`;
    return`<button style="background:${R.bg};color:${R.text};border:${R.bd};border-radius:${S.r};padding:${S.pv}px ${S.ph}px;font-size:${S.fs}px;font-weight:600;min-height:${S.h}px;cursor:${cur};font-family:inherit;opacity:${op};display:inline-flex;align-items:center;gap:${Math.max(S.ic/3,4)}px;${extra}">${iconHtml}${label}</button>`;
  };

  // §1 — Role × State Matrix
  h+=`<div class="stitle">§1 角色 × 狀態矩陣</div>`;
  const roles=['primary','secondary','tertiary','ghost'];
  const roleLabels={primary:'Primary ★★★★★ 最高優先',secondary:'Secondary ★★★★ 品牌CTA',tertiary:'Tertiary ★★★ 輔助',ghost:'Ghost ★★ 最輕量'};
  const roleDesc={primary:'深灰底 + 橘字。每 section 最多一個',secondary:'橘底 + 白字。獨立CTA，不與 primary 並排',tertiary:'白底 + 橘框。次要操作',ghost:'透明 + 橘字。最輕量操作'};
  const states=['default','hover','pressed','disabled','loading'];

  roles.forEach(role=>{
    h+=`<div class="card"><div class="clabel">${roleLabels[role]}</div><div style="font-size:11px;color:#9798A2;margin-bottom:12px">${roleDesc[role]}</div>`;
    h+=`<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">`;
    states.forEach(st=>{
      h+=`<div style="text-align:center">${btn(role,st==='loading'?'Loading':'Button','md',st,'label')}<div style="font-size:10px;color:#9798A2;margin-top:4px">${st}</div></div>`;
    });
    h+=`</div></div>`;
  });

  // §2 — Size (5 sizes including xs pill)
  h+=`<div class="stitle">§2 尺寸（5 級）</div><div class="card">`;
  [{n:'xs',h:24,fs:11,scene:'關注+、極緊湊（pill）'},{n:'sm',h:32,fs:12,scene:'卡片內 CTA'},{n:'md',h:40,fs:14,scene:'Web 通用（預設）'},{n:'lg',h:48,fs:14,scene:'App 觸控、Dialog'},{n:'xl',h:52,fs:16,scene:'全寬 CTA'}].forEach(s=>{
    h+=`<div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">`;
    h+=`<div style="width:28px;font-size:12px;font-weight:600;color:#9798A2">${s.n}</div>`;
    h+=btn('primary','Button',s.n,'default','label');
    h+=btn('secondary','Button',s.n,'default','label');
    h+=btn('tertiary','Button',s.n,'default','label');
    h+=`<div style="font-size:10px;color:#B9BABF">${s.h}px · ${s.fs}px · ${s.scene}</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;

  // §3 — Form (label / label-icon / icon)
  h+=`<div class="stitle">§3 型態（Form）</div><div class="card">`;
  h+=`<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px">`;
  h+=`<div style="text-align:center">${btn('primary','送出','md','default','label')}<div style="font-size:10px;color:#9798A2;margin-top:4px">label</div></div>`;
  h+=`<div style="text-align:center">${btn('tertiary','關注','md','default','label-icon')}<div style="font-size:10px;color:#9798A2;margin-top:4px">label-icon (leading)</div></div>`;
  h+=`<div style="text-align:center">${btn('ghost','','md','default','icon')}<div style="font-size:10px;color:#9798A2;margin-top:4px">icon</div></div>`;
  h+=`</div>`;
  h+=`<div style="font-size:11px;color:#73747B">Icon size 跟 button size 走：xs=12, sm=16, md=20, lg=24, xl=24。Icon-only 用正方形容器。</div>`;
  h+=`</div>`;

  // §4 — Status (danger / info)
  h+=`<div class="stitle">§4 語義色覆寫（Status）</div><div class="card">`;
  h+=`<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:12px">`;
  h+=`<button style="background:#FFF;color:#FF4E51;border:1px solid #FF4E51;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">刪除商品</button>`;
  h+=`<div style="font-size:11px;color:#9798A2">tertiary + danger（紅色系 error）</div>`;
  h+=`</div>`;
  h+=`<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:12px">`;
  h+=`<button style="background:transparent;color:#FF4E51;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">取消訂單</button>`;
  h+=`<div style="font-size:11px;color:#9798A2">ghost + danger</div>`;
  h+=`</div>`;
  h+=`<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">`;
  h+=`<button style="background:#3B82F6;color:#FFF;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">開抽</button>`;
  h+=`<div style="font-size:11px;color:#9798A2">primary + info（藍色系，一番賞）</div>`;
  h+=`</div></div>`;

  // §5 — Dialog Footer Combos
  h+=`<div class="stitle">§5 Dialog Footer 標準組合</div><div class="card">`;
  [{l:'一般確認',left:btn('ghost','再想想','lg','default','label'),right:btn('primary','確定','lg','default','label')},
   {l:'危險操作',left:btn('ghost','取消','lg','default','label'),right:`<button style="background:#FFF;color:#FF4E51;border:1px solid #FF4E51;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">刪除</button>`},
   {l:'表單導航',left:btn('ghost','上一步','lg','default','label'),right:btn('primary','下一步','lg','default','label')}
  ].forEach(c=>{
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F0F0F5"><div style="font-size:12px;font-weight:600;color:#47484D;width:80px">${c.l}</div><div style="display:flex;gap:12px">${c.left}${c.right}</div></div>`;
  });
  h+=`</div>`;

  // §6 — Wrapper Business Buttons
  h+=`<div class="stitle">§6 業務狀態按鈕（Wrapper）</div><div class="card">`;
  h+=`<div class="clabel">Toggle 行為 — 同一按鈕根據業務狀態切換外觀</div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">`;
  // FollowButton
  h+=`<div style="background:#F6F7FE;border-radius:10px;padding:16px"><div style="font-size:12px;font-weight:600;color:#47484D;margin-bottom:8px">FollowButton</div>`;
  h+=`<div style="display:flex;gap:8px;align-items:center">${btn('tertiary','關注','xs','default','label-icon')}<span style="font-size:11px;color:#9798A2">→</span>${btn('secondary','已關注','xs','default','label')}</div></div>`;
  // ExpandButton
  h+=`<div style="background:#F6F7FE;border-radius:10px;padding:16px"><div style="font-size:12px;font-weight:600;color:#47484D;margin-bottom:8px">ExpandButton</div>`;

  // AuctionButton
  h+=`<div style="background:#F6F7FE;border-radius:10px;padding:16px"><div style="font-size:12px;font-weight:600;color:#47484D;margin-bottom:8px">AuctionButton</div>`;

  h+=`<div style="font-size:10px;color:#9798A2">inactive: 中灰字 400</div>`;

  gTk('sys','duration').forEach(t=>{
    let n=t.path.split('/').pop(),ms=rNum(t.value);
    h+=`<div class="durcard" onclick="let d=this.querySelector('.dd');d.style.transform='scale(1.5) rotate(180deg)';setTimeout(()=>d.style.transform='scale(1)',${ms}+80)"><div class="dd" style="width:32px;height:32px;border-radius:8px;background:#FF963B;margin:0 auto 10px;transition:transform ${ms}ms cubic-bezier(.4,0,.2,1)"></div><div style="font-size:14px;font-weight:700">${n}</div><div style="font-size:24px;font-weight:800;color:#FF963B;margin-top:2px">${ms}<span style="font-size:10px;font-weight:400;color:#9798A2">ms</span></div></div>`;
  });
  h+=`</div>`;return h;
}

// === PAGE: GRID ===
function pgGrid(){
  let h=pgHead('grid','Grid 系統','響應式格線系統，支援 Mobile、Tablet、Desktop 三種佈局。');
  h+=`<div class="card"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px">`;
  [{n:'Mobile',cols:4,g:16,m:16,bp:'< 768px'},{n:'Tablet',cols:8,g:24,m:24,bp:'768 ~ 991px'},{n:'Desktop',cols:12,g:24,m:32,bp:'≥ 992px'}].forEach(g=>{
    h+=`<div style="text-align:center"><div style="font-size:14px;font-weight:700;margin-bottom:4px">${g.n}</div><div style="font-size:11px;color:#9798A2;margin-bottom:12px">${g.bp}</div>
    <div style="display:flex;gap:2px;justify-content:center">`;
    for(let i=0;i<g.cols;i++)h+=`<div style="width:${Math.max(40/g.cols*4,4)}px;height:40px;background:#FF963B20;border-radius:3px"></div>`;
    h+=`</div><div style="font-size:12px;font-weight:600;color:#47484D;margin-top:8px">${g.cols} columns</div><div style="font-size:10px;color:#9798A2">gutter: ${g.g}px · margin: ${g.m}px</div></div>`;
  });
  h+=`</div></div>`;
  return h;
}

// === ROUTER ===
function go(page){
  curPage=page;
  buildSide();
  let h='';
  switch(page){
    case'overview':h=pgOverview();break;
    case'colors':h=pgColors();break;
    case'typography':h=pgTypography();break;
    case'spacing':h=pgSpacing();break;
    case'radius':h=pgRadius();break;
    case'elevation':h=pgElevation();break;
    case'button':h=pgButton();break;
    case'tab':h=pgTab();break;
    case'avatar':h=pgAvatar();break;
    case'thumbnail':h=pgThumbnail();break;
    case'input':h=pgInput();break;
    case'badge':h=pgBadge();break;
    case'card':h=pgCard();break;
    case'motion':h=pgMotion();break;
    case'grid':h=pgGrid();break;
    default:h=pgOverview();
  }
  document.getElementById('main').innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}

// Init
loadData();
</script>
